<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3D Molecules</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #0b0f17;
        color: rgba(255, 255, 255, 0.9);
        font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      }
      canvas {
        display: block;
      }
      .wrap {
        height: 100%;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(560px, 100%);
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        padding: 18px 18px 14px;
        backdrop-filter: blur(10px);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 18px;
        letter-spacing: 0.2px;
      }
      p {
        margin: 0 0 14px;
        color: rgba(255, 255, 255, 0.75);
      }
      .links {
        display: grid;
        gap: 10px;
      }
      a {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 12px;
        border-radius: 10px;
        text-decoration: none;
        color: rgba(255, 255, 255, 0.9);
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }
      a:hover {
        background: rgba(255, 255, 255, 0.085);
      }
      .hint {
        margin-top: 12px;
        font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        color: rgba(255, 255, 255, 0.6);
      }
      .topbar {
        position: fixed;
        left: 12px;
        right: 12px;
        top: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        pointer-events: none;
      }
      .hud {
        pointer-events: none;
        font: 12px/1.3 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        color: rgba(255, 255, 255, 0.75);
      }
      .back {
        pointer-events: auto;
        font: 12px/1.3 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        color: rgba(255, 255, 255, 0.75);
        text-decoration: none;
        padding: 8px 10px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        display: none;
      }
      .back:hover {
        background: rgba(255, 255, 255, 0.085);
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="hud" data-hud></div>
      <a class="back" data-back href="./index.html">Back</a>
    </div>
    <div class="wrap">
      <div class="card">
        <h1>3D molecules (Three.js)</h1>
        <p>Pick one model to view.</p>

        <div class="links">
          <a href="./index.html?mol=h2o"><span>H2O</span><span>→</span></a>
          <a href="./index.html?mol=co2"><span>CO2</span><span>→</span></a>
          <a href="./index.html?mol=both"><span>H2O + CO2</span><span>→</span></a>
        </div>

        <div class="hint">
          Tip: open via a local server to avoid module/CORS issues.
        </div>
      </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.166.1/build/three.module.js"
        }
      }
    </script>

    <script type="module">
      import { startViewer } from "./viewer.js";

      const mol = new URLSearchParams(location.search).get("mol");
      if (!mol) {
        // Menu mode
        const hud = document.querySelector("[data-hud]");
        if (hud) hud.textContent = "";
      } else {
        // Viewer mode
        document.querySelector(".wrap")?.remove();
        const back = document.querySelector("[data-back]");
        if (back) back.style.display = "inline-flex";

        const hud = document.querySelector("[data-hud]");
        if (hud) hud.textContent = mol.toUpperCase();

        if (mol === "both") {
          const [{ createMolecule: createH2O }, { createMolecule: createCO2 }] =
            await Promise.all([import("./h2o.js"), import("./co2.js")]);

          startViewer({
            title: "H2O + CO2",
            createSceneObject: ({ THREE }) => {
              const root = new THREE.Group();
              const h2oBase = createH2O({ THREE });
              const co2Base = createCO2({ THREE });

              const count = 100;
              const minDist = 0.62; // separation between molecule centers

              const samplePoints = (n, bounds, minDistance) => {
                const cellSize = minDistance;
                const inv = 1 / cellSize;
                const grid = new Map(); // "ix,iy" -> point index
                const points = [];

                const key = (ix, iy) => `${ix},${iy}`;
                const toCell = (p) => ({
                  ix: Math.floor((p.x - bounds.minX) * inv),
                  iy: Math.floor((p.y - bounds.minY) * inv)
                });

                const isOk = (p) => {
                  const { ix, iy } = toCell(p);
                  for (let dx = -2; dx <= 2; dx++) {
                    for (let dy = -2; dy <= 2; dy++) {
                      const idx = grid.get(key(ix + dx, iy + dy));
                      if (idx === undefined) continue;
                      const q = points[idx];
                      const ddx = p.x - q.x;
                      const ddy = p.y - q.y;
                      if (ddx * ddx + ddy * ddy < minDistance * minDistance)
                        return false;
                    }
                  }
                  return true;
                };

                const maxAttempts = n * 400;
                for (let attempts = 0; attempts < maxAttempts && points.length < n; attempts++) {
                  const p = new THREE.Vector3(
                    THREE.MathUtils.lerp(bounds.minX, bounds.maxX, Math.random()),
                    THREE.MathUtils.lerp(bounds.minY, bounds.maxY, Math.random()),
                    0
                  );
                  if (!isOk(p)) continue;
                  const { ix, iy } = toCell(p);
                  grid.set(key(ix, iy), points.length);
                  points.push(p);
                }
                return points;
              };

              const scatter = (base, points) => {
                const group = new THREE.Group();
                for (const p of points) {
                  const clone = base.clone(true);
                  clone.position.copy(p);
                  clone.rotation.set(
                    (Math.random() - 0.5) * 0.4,
                    Math.random() * Math.PI * 2,
                    (Math.random() - 0.5) * 0.4
                  );
                  clone.userData.rot = {
                    x: (Math.random() - 0.5) * 0.6,
                    y: (Math.random() - 0.5) * 1.2,
                    z: (Math.random() - 0.5) * 0.6
                  };
                  group.add(clone);
                }
                return group;
              };

              // Two regions "next to" each other to avoid cross-overlaps.
              const gap = 1.4;
              const regionW = 6.6;
              const regionH = 6.6;

              const leftBounds = {
                minX: -(gap / 2 + regionW),
                maxX: -gap / 2,
                minY: -regionH / 2,
                maxY: regionH / 2
              };
              const rightBounds = {
                minX: gap / 2,
                maxX: gap / 2 + regionW,
                minY: -regionH / 2,
                maxY: regionH / 2
              };

              const h2oPts = samplePoints(count, leftBounds, minDist);
              const co2Pts = samplePoints(count, rightBounds, minDist);

              root.add(scatter(h2oBase, h2oPts));
              root.add(scatter(co2Base, co2Pts));

              return root;
            },
            onFrame: ({ t, root }) => {
              root.traverse((obj) => {
                const r = obj.userData?.rot;
                if (!r) return;
                obj.rotation.x += r.x * 0.016;
                obj.rotation.y += r.y * 0.016;
                obj.rotation.z += r.z * 0.016;
              });
            }
          });
        } else {
          let module;
          if (mol === "h2o") module = await import("./h2o.js");
          else if (mol === "co2") module = await import("./co2.js");
          else throw new Error(`Unknown mol: ${mol}`);

          startViewer({
            title: mol.toUpperCase(),
            createSceneObject: module.createMolecule,
            onFrame: ({ t, root }) => {
              root.rotation.x = t * 0.35;
              root.rotation.y = t * 0.6;
            }
          });
        }
      }
    </script>
  </body>
</html>
